<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fokas</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@400;500&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:        #0e0e10;
      --surface:   #18181b;
      --border:    #2a2a2f;
      --text:      #f0f0f2;
      --muted:     #7a7a8c;
      --accent:    #5b5ef4;
      --accent-hi: #7b7ef8;
      --on-green:  #22c55e;
      --on-glow:   rgba(34, 197, 94, 0.18);
      --off-track: #2a2a2f;
      --radius:    14px;
    }

    html, body {
      width: 300px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      user-select: none;
      overflow: hidden;
    }

    .container {
      padding: 22px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: linear-gradient(135deg, #5b5ef4 0%, #8b5cf6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 14px rgba(91,94,244,0.45);
    }

    .logo svg {
      width: 18px;
      height: 18px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0.03em;
      color: var(--text);
    }

    .brand-tagline {
      font-size: 11px;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0.01em;
      margin-top: 1px;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      border-radius: 1px;
    }

    /* ── Toggle Card ── */
    .toggle-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .toggle-card.active {
      border-color: rgba(34, 197, 94, 0.35);
      box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.1), inset 0 0 24px rgba(34, 197, 94, 0.04);
    }

    .toggle-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .toggle-label {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
    }

    .toggle-status {
      font-size: 12px;
      color: var(--muted);
      transition: color 0.3s ease;
    }

    .toggle-status.on {
      color: var(--on-green);
    }

    /* ── Switch ── */
    .switch {
      position: relative;
      width: 50px;
      height: 28px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .track {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: var(--off-track);
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .switch input:checked ~ .track {
      background: var(--on-green);
      box-shadow: 0 0 12px var(--on-glow);
    }

    .thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
      transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .switch input:checked ~ .track .thumb {
      transform: translateX(22px);
    }

    /* ── Stats / info strip ── */
    .info-strip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 13px;
    }

    .info-icon {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .info-icon.active {
      background: var(--on-green);
      box-shadow: 0 0 6px var(--on-glow);
    }

    .info-text {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      font-size: 11px;
      color: #3a3a4a;
      letter-spacing: 0.04em;
    }

    /* ── Ripple on toggle card ── */
    .toggle-card {
      overflow: hidden;
    }

  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="logo" style="background: none; box-shadow: none; padding: 0;">
        <img src="icons/icon48.png" width="34" height="34" style="border-radius: 8px; display: block;"/>
      </div>
      <div class="brand">
        <span class="brand-name">Fokas</span>
        <span class="brand-tagline">YouTube Shorts Blocker</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="toggle-card" id="toggleCard">
      <div class="toggle-info">
        <span class="toggle-label">Block Shorts</span>
        <span class="toggle-status" id="statusText">Loading…</span>
      </div>
      <label class="switch" aria-label="Toggle Shorts blocking">
        <input type="checkbox" id="mainToggle" />
        <div class="track">
          <div class="thumb"></div>
        </div>
      </label>
    </div>

    <div class="info-strip">
      <div class="info-icon" id="infoIcon"></div>
      <span class="info-text" id="infoText">Loading extension state…</span>
    </div>

    <div class="footer">FOKAS &nbsp;·&nbsp; STAY IN FLOW</div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
